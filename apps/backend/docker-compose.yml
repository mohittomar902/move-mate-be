services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: movemate-postgres
    environment:
      POSTGRES_USER: movemate
      POSTGRES_PASSWORD: movemate
      POSTGRES_DB: movemate
    ports:
      - "5432:5432"
    volumes:
      - movemate_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: movemate-redis
    ports:
      - "6379:6379"

volumes:
  movemate_postgres:
